<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MetaPath</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background-color:#05070c;color:#63f6f8;font-family:'Share Tech Mono','Courier New',monospace;width:100%;min-height:100vh;overflow-x:hidden}
  .nav{display:flex;align-items:center;padding:7px 40px;height:56px;position:relative}
  .nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:#63f6f8;opacity:0.35}
  .logo img{width:90px;height:90px;object-fit:contain;opacity:.9}
  .main{display:flex;flex-direction:column;padding:36px 24px 24px 24px;min-height:calc(100vh - 56px);gap:32px}
  .header{text-align:center;margin-bottom:20px}
  .header-title{font-size:42px;font-weight:400;line-height:1.2;letter-spacing:0.06em;color:#63f6f8;margin-bottom:12px}
  .header-title .highlight{color:#63f6f8}
  .header-subtitle{font-size:14px;color:#63f6f8;font-weight:300;opacity:0.6}
  .cards-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:20px;width:100%;max-width:1400px;margin:0 auto}
  .card{background:#0d1117;border-radius:12px;padding:20px;border:1px solid #1a2030;position:relative;overflow:hidden;cursor:pointer;transition:all 0.3s ease;display:flex;flex-direction:column}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:#111520;opacity:0}
  .card:hover{border-color:#63f6f8;box-shadow:0 0 20px rgba(99, 246, 248, 0.1)}
  .card-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;position:relative;z-index:1;justify-content:space-between}
  .card-header-left{display:flex;align-items:center;gap:12px}
  .card-num{font-size:36px;font-weight:bold;color:#63f6f8;background:#1a1f2e;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid #2a3040;opacity:0.6;flex-shrink:0}
  .card-label{font-size:14px;color:#63f6f8;font-weight:500}
  .copy-btn{background:transparent;border:1px solid #63f6f8;color:#63f6f8;width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;transition:all 0.3s ease;flex-shrink:0}
  .copy-btn:hover{border-color:#63f6f8;box-shadow:0 0 12px rgba(99, 246, 248, 0.3);background:rgba(99, 246, 248, 0.1)}
  .copy-btn:active{transform:scale(0.95)}
  .copy-btn svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .card-image{width:100%;height:330px;object-fit:cover;border-radius:8px;margin-bottom:16px;position:relative;z-index:1}
</style>
</head>

function copyPathCode(event, pathName) {
  event.stopPropagation();
  const button = event.target.closest('.copy-btn');
  const pathCode = pathCodeLibrary[pathName];
  
  if (pathCode) {
    navigator.clipboard.writeText(pathCode).then(() => {
      button.style.background = 'rgba(99, 246, 248, 0.2)';
      setTimeout(() => {
        button.style.background = 'transparent';
      }, 1500);
    });
  }
}

function copyPath(event) {
  event.stopPropagation();
  const button = event.target.closest('.copy-btn');
  const card = button.closest('.card');
  const label = card.querySelector('.card-label').textContent;
  const num = card.querySelector('.card-num').textContent;
  const pathText = `${num} ${label}`;
  
  navigator.clipboard.writeText(pathText).then(() => {
    button.style.background = 'rgba(99, 246, 248, 0.2)';
    setTimeout(() => {
      button.style.background = 'transparent';
    }, 1500);
  });
}
